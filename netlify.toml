# Configuration Netlify — site statique, aucun build nécessaire

[build]
  publish = "."

# ── Sécurité : en-têtes HTTP recommandés ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Performance : les JSON sont revalidés à chaque visite ──
# (sinon un navigateur mobile garde d'anciennes données jusqu'à 1 h
# après un déploiement, alors que le HTML — toujours frais — référence
# déjà le nouveau contenu : les nouvelles fiches ne s'ouvrent plus)
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/modeles/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Assets statiques (polices, images) : cache long ──
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
